name: "\U0001F4F9 Resumir Video"
description: "Envía una URL de video para generar un resumen gratuito con IA"
labels: ["resumir"]
body:
  - type: markdown
    attributes:
      value: |
        ## 📹 Solicitar resumen de video
        Pega la URL y el sistema generará automáticamente un resumen completo usando IA.
        **Coste: $0.00** — Todo corre en Gemini free tier + GitHub Actions.
  - type: input
    id: url
    attributes:
      label: URL del video
      description: "YouTube, Vimeo, Google Drive, o cualquier URL directa a un video"
      placeholder: "https://www.youtube.com/watch?v=..."
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Contexto adicional (opcional)
      description: "Cualquier información que ayude a mejorar el resumen (idioma, tema, participantes...)"
